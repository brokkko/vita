<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Розовая Книга</title>
    <style>
        /* --- НАСТРОЙКИ ФОНА --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #ffd1ff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 60%);
            animation: shine 15s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes shine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- АДАПТИВНАЯ КНИГА --- */
        .book {
            position: relative;
            width: 90vw;
            max-width: 480px;
            aspect-ratio: 3 / 4;
            perspective: 1500px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left center;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            border-radius: 4px 12px 12px 4px;

            /* ЦВЕТ ОБРАТНОЙ СТОРОНЫ СТРАНИЦЫ */
            background-color: #ffded2; /* Белый цвет "бумаги" */

            box-shadow: inset -5px 0 10px rgba(0,0,0,0.05);
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px 12px 12px 4px;
            display: block;

            /* СКРЫВАЕМ КАРТИНКУ С ОБРАТНОЙ СТОРОНЫ */
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        /* Слои страниц */
        #p1 { z-index: 7; }
        #p2 { z-index: 6; }
        #p3 { z-index: 5; }
        #p4 { z-index: 4; }
        #p5 { z-index: 3; }
        #p6 { z-index: 2; }
        #p7 { z-index: 1; }

        /* --- КНОПКИ --- */
        .controls {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 30px;
            z-index: 10;
        }

        button {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            color: #d63384;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 51, 132, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover:not(:disabled) {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.3);
            color: #ff006e;
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            color: #888;
        }
    </style>
</head>
<body>

<div class="book">
    <div class="page" id="p1">
        <img src="/data/page 1.png" alt="Страница 1">
    </div>
    <div class="page" id="p2">
        <img src="/data/page 2.png" alt="Страница 2">
    </div>
    <div class="page" id="p3">
        <img src="/data/page 3.png" alt="Страница 3">
    </div>
    <div class="page" id="p4">
        <img src="/data/page 4.png" alt="Страница 4">
    </div>
    <div class="page" id="p5">
        <img src="/data/page 5.png" alt="Страница 5">
    </div>
    <div class="page" id="p6">
        <img src="/data/page 6.png" alt="Страница 6">
    </div>
    <!-- Исправила ID на p7, чтобы не было дублей -->
    <div class="page" id="p7">
        <img src="/data/page 7.png" alt="Страница 7">
    </div>
</div>

<div class="controls">
    <button id="prevBtn" onclick="goPrev()">
        <span>&#8592;</span> Назад
    </button>
    <button id="nextBtn" onclick="goNext()">
        Вперед <span>&#8594;</span>
    </button>
</div>

<script>
    const pages = document.querySelectorAll('.page');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');

    let currentPage = 0;
    const totalPages = pages.length;

    function updateButtons() {
        prevBtn.disabled = currentPage === 0;
        nextBtn.disabled = currentPage === totalPages;
    }

    function goNext() {
        if (currentPage < totalPages) {
            pages[currentPage].classList.add('flipped');
            currentPage++;
            updateButtons();
        }
    }

    function goPrev() {
        if (currentPage > 0) {
            currentPage--;
            pages[currentPage].classList.remove('flipped');
            updateButtons();
        }
    }

    updateButtons();
</script>
</body>
</html>
